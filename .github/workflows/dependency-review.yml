# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Unlicense, CC0-1.0
          allow-dependencies-licenses: >-
            pkg:golang/golang.org/x/crypto,
            pkg:golang/golang.org/x/mod,
            pkg:golang/golang.org/x/net,
            pkg:golang/golang.org/x/sync,
            pkg:golang/golang.org/x/sys,
            pkg:golang/golang.org/x/telemetry,
            pkg:golang/golang.org/x/term,
            pkg:golang/golang.org/x/text,
            pkg:golang/golang.org/x/tools
          comment-summary-in-pr: on-failure
