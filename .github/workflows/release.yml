# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

# DuckDB version MUST match the duckdb-go driver version in go.mod.
# duckdb-go v2.5.5 → duckdb-go-bindings v0.3.3 → DuckDB v1.4.4
env:
  DUCKDB_VERSION: "v1.4.4"

jobs:
  # Resolve tag for both push and workflow_dispatch triggers
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG}, version: ${TAG#v}"

  test:
    name: Test
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build-vscode-extension:
    name: Build VS Code Extension
    needs: [resolve-tag, test]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-bino/package-lock.json

      - name: Install dependencies
        working-directory: vscode-bino
        run: npm ci

      - name: Compile extension
        working-directory: vscode-bino
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: vscode-bino
        run: vsce package --out vscode-bino.vsix

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: vscode-bino/vscode-bino.vsix
          retention-days: 30
      - name: Publish to VS Code Marketplace
        working-directory: vscode-bino
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p "$VSCE_PAT" ${{ needs.resolve-tag.outputs.version }}

  # Build binaries for each platform (CGO required for duckdb-go).
  # macOS and Linux use the default duckdb-go-bindings (extensions installed at runtime).
  # Windows links the pre-built DuckDB DLL from GitHub releases.
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [test, resolve-tag]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          # - goos: linux
          #   goarch: arm64
          #   runner: ubuntu-24.04-arm
          - goos: windows
            goarch: amd64
            runner: windows-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download pre-built DuckDB library (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          curl -sL -o libduckdb.zip "https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/libduckdb-windows-amd64.zip"
          mkdir -p duckdb-lib
          unzip libduckdb.zip -d duckdb-lib
          ls -la duckdb-lib/

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          COMMIT=${GITHUB_SHA::8}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Version=${VERSION}'"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Commit=${COMMIT}'"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Date=${DATE}'"

          BUILD_TAGS=""

          # Windows: link pre-built DuckDB DLL
          if [ "${{ matrix.goos }}" = "windows" ]; then
            DUCKDB_LIB_DIR="${{ github.workspace }}/duckdb-lib"
            BUILD_TAGS="-tags duckdb_use_lib"
            export CGO_LDFLAGS="-L${DUCKDB_LIB_DIR} -lduckdb"
            export CGO_CFLAGS="-I${DUCKDB_LIB_DIR}"
          fi

          mkdir -p dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build ${BUILD_TAGS} -ldflags "${LDFLAGS}" -o dist/bino.exe ./cmd/bino
          else
            go build -ldflags "${LDFLAGS}" -o dist/bino ./cmd/bino
          fi

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          ARCH=${{ matrix.goarch }}
          if [ "$ARCH" = "amd64" ]; then
            ARCH="x86_64"
          fi
          OS=$(echo "${{ matrix.goos }}" | sed 's/darwin/Darwin/;s/linux/Linux/')
          tar -czvf bino-cli_${OS}_${ARCH}.tar.gz bino
          rm bino

      - name: Copy DuckDB DLL to dist (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Copy-Item "${{ github.workspace }}\duckdb-lib\duckdb.dll" dist\

      - name: Install Inno Setup (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.resolve-tag.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$VERSION installer\bino-setup.iss

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path bino.exe, duckdb.dll -DestinationPath bino-cli_Windows_x86_64.zip
          Remove-Item bino.exe, duckdb.dll

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Release
    needs: [build, build-vscode-extension, resolve-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/
          merge-multiple: true

      - name: Download VS Code extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: dist/

      - name: Add installer scripts to dist
        run: |
          mkdir -p dist
          cp install.sh dist/
          cp install.ps1 dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/bino-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.tar.gz *.zip *_setup.exe *.vsix install.sh install.ps1 bino-sbom.spdx.json > checksums.txt
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_setup.exe
            dist/*.vsix
            dist/install.sh
            dist/install.ps1
            dist/bino-sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          repository: bino-bi/bino-cli-releases
          token: ${{ secrets.BINO_CLI_RELEASES_TOKEN }}
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: ${{ needs.resolve-tag.outputs.tag }}
          body: |
            ## Bino CLI ${{ needs.resolve-tag.outputs.tag }}

            **Commit:** `${{ github.sha }}`

            Artifacts carry a SLSA v1.0 build-provenance attestation. Verify with:
            ```
            gh attestation verify <file> --repo bino-bi/bino-cli
            ```
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_setup.exe
            dist/*.vsix
            dist/install.sh
            dist/install.ps1
            dist/bino-sbom.spdx.json
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/
          retention-days: 30

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: [release, resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Extract checksums and update formula
        id: formula
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          CHECKSUMS_FILE="dist/checksums.txt"

          # Extract SHA256 sums from checksums.txt
          SHA256_DARWIN_ARM64=$(grep "bino-cli_Darwin_arm64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          SHA256_DARWIN_X86_64=$(grep "bino-cli_Darwin_x86_64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          SHA256_LINUX_X86_64=$(grep "bino-cli_Linux_x86_64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')

          echo "Version: $VERSION"
          echo "Darwin ARM64: $SHA256_DARWIN_ARM64"
          echo "Darwin x86_64: $SHA256_DARWIN_X86_64"
          echo "Linux x86_64: $SHA256_LINUX_X86_64"

          # Update formula with actual values
          cp homebrew/bino-cli.rb homebrew/bino-cli-updated.rb
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_DARWIN_ARM64_PLACEHOLDER/$SHA256_DARWIN_ARM64/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_DARWIN_X86_64_PLACEHOLDER/$SHA256_DARWIN_X86_64/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_LINUX_X86_64_PLACEHOLDER/$SHA256_LINUX_X86_64/g" homebrew/bino-cli-updated.rb

          echo "=== Updated formula ==="
          cat homebrew/bino-cli-updated.rb

      - name: Push to Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.BINO_CLI_RELEASES_TOKEN }}
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"

          # Clone the tap repository
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/bino-bi/homebrew-tap.git" tap-repo

          # Create Formula directory if it doesn't exist
          mkdir -p tap-repo/Formula

          # Copy the updated formula
          cp homebrew/bino-cli-updated.rb tap-repo/Formula/bino-cli.rb

          # Commit and push
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bino-cli.rb
          git commit -m "Update bino-cli to v${VERSION}" || echo "No changes to commit"
          git push origin main

  build-docs:
    name: Build and Push Docs
    needs: [release, resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push docs image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./docs
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/bino/cli-docs:${{ needs.resolve-tag.outputs.version }}
            ${{ secrets.DOCKER_REGISTRY }}/bino/cli-docs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update stack
        uses: fjogeleit/http-request-action@551353b829c3646756b2ec2b3694f819d7957495 # v2.0.0
        with:
          url: ${{ secrets.DEPLOY_URL }}
          bearerToken: ${{ secrets.DEPLOY_TOKEN }}
          timeout: 60000
          data: |
            {
              "resource": "bino-bi",
              "actions": [
                { "env": {
                    "CLI_VERSION": "${{ needs.resolve-tag.outputs.version }}"
                  }
                }
              ]
            }
