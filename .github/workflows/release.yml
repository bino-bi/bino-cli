# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

# DuckDB version MUST match the duckdb-go driver version in go.mod.
# duckdb-go v2.5.5 → duckdb-go-bindings v0.3.3 → DuckDB v1.4.4
env:
  DUCKDB_VERSION: "v1.4.4"

jobs:
  # Resolve tag for both push and workflow_dispatch triggers
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG}, version: ${TAG#v}"

  test:
    name: Test
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build-vscode-extension:
    name: Build VS Code Extension
    needs: [resolve-tag, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-bino/package-lock.json

      - name: Install dependencies
        working-directory: vscode-bino
        run: npm ci

      - name: Compile extension
        working-directory: vscode-bino
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: vscode-bino
        run: vsce package --out vscode-bino.vsix

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-bino/vscode-bino.vsix
          retention-days: 30
      - name: Publish to VS Code Marketplace
        working-directory: vscode-bino
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p "$VSCE_PAT" ${{ needs.resolve-tag.outputs.version }}

  # Build DuckDB from source with embedded extensions (Linux and Windows).
  # This produces libduckdb_bundle.a which is linked into the Go binary via
  # the duckdb_use_static_lib build tag, avoiding runtime extension downloads
  # that fail on windows_amd64_mingw.
  build-duckdb:
    name: Build DuckDB (${{ matrix.target }})
    needs: [test, resolve-tag]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            cc: gcc
            cxx: g++
            vcpkg_triplet: x64-linux
          - target: windows-amd64
            cc: x86_64-w64-mingw32-gcc
            cxx: x86_64-w64-mingw32-g++
            vcpkg_triplet: x64-mingw-static
    steps:
      - name: Install MinGW (Windows cross-compilation)
        if: matrix.target == 'windows-amd64'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Clone DuckDB
        run: git clone --depth 1 --branch ${{ env.DUCKDB_VERSION }} https://github.com/duckdb/duckdb.git duckdb-src

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/packages
            vcpkg/downloads
          key: vcpkg-${{ matrix.vcpkg_triplet }}-${{ env.DUCKDB_VERSION }}

      - name: Build libduckdb_bundle.a
        working-directory: duckdb-src
        run: |
          CC=${{ matrix.cc }} \
          CXX=${{ matrix.cxx }} \
          DUCKDB_PLATFORM=any \
          BUILD_EXTENSIONS="autocomplete;excel;postgres;mysql;httpfs" \
          USE_MERGED_VCPKG_MANIFEST=1 \
          VCPKG_TOOLCHAIN_PATH=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
          VCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} \
          make bundle-library

      - name: Upload DuckDB static library
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ matrix.target }}
          path: duckdb-src/build/release/libduckdb_bundle.a
          retention-days: 1

  # Build binaries for each platform (CGO required for duckdb-go).
  # Linux and Windows use the static DuckDB bundle with embedded extensions.
  # macOS uses the default duckdb-go-bindings (extensions installed at runtime).
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [test, resolve-tag, build-duckdb]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            static: false
          - goos: darwin
            goarch: arm64
            runner: macos-15
            static: false
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            static: true
          # - goos: linux
          #   goarch: arm64
          #   runner: ubuntu-24.04-arm
          #   static: true
          - goos: windows
            goarch: amd64
            runner: ubuntu-24.04
            static: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW (Windows cross-compilation)
        if: matrix.goos == 'windows'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Download DuckDB static library
        if: matrix.static
        uses: actions/download-artifact@v4
        with:
          name: duckdb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: duckdb-lib

      - name: Verify DuckDB static library
        if: matrix.static
        run: |
          test -f duckdb-lib/libduckdb_bundle.a || { echo "ERROR: libduckdb_bundle.a not found"; exit 1; }
          ls -lh duckdb-lib/libduckdb_bundle.a

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          COMMIT=${GITHUB_SHA::8}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Version=${VERSION}'"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Commit=${COMMIT}'"
          LDFLAGS="${LDFLAGS} -X 'bino.bi/bino/internal/version.Date=${DATE}'"

          BUILD_TAGS=""
          DUCKDB_LIB_DIR="${{ github.workspace }}/duckdb-lib"

          # Static DuckDB build: link against libduckdb_bundle.a with embedded extensions
          if [ "${{ matrix.static }}" = "true" ]; then
            BUILD_TAGS="-tags duckdb_use_static_lib"
            export CGO_CPPFLAGS="-DDUCKDB_STATIC_BUILD"

            if [ "${{ matrix.goos }}" = "linux" ]; then
              export CGO_LDFLAGS="-L${DUCKDB_LIB_DIR} -lduckdb_bundle -lstdc++ -lm -ldl"
            elif [ "${{ matrix.goos }}" = "windows" ]; then
              export CC=x86_64-w64-mingw32-gcc
              export CXX=x86_64-w64-mingw32-g++
              export CGO_LDFLAGS="-L${DUCKDB_LIB_DIR} -lduckdb_bundle -lws2_32 -lwsock32 -lrstrtmgr -lstdc++ -lm --static"
            fi
          fi

          mkdir -p dist

          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build ${BUILD_TAGS} -ldflags "${LDFLAGS}" -o dist/bino.exe ./cmd/bino
          else
            go build ${BUILD_TAGS} -ldflags "${LDFLAGS}" -o dist/bino ./cmd/bino
          fi

      - name: Create archive
        shell: bash
        run: |
          cd dist
          ARCH=${{ matrix.goarch }}
          if [ "$ARCH" = "amd64" ]; then
            ARCH="x86_64"
          fi

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip bino-cli_Windows_${ARCH}.zip bino.exe
            rm bino.exe
          else
            OS=$(echo "${{ matrix.goos }}" | sed 's/darwin/Darwin/;s/linux/Linux/')
            tar -czvf bino-cli_${OS}_${ARCH}.tar.gz bino
            rm bino
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Release
    needs: [build, build-vscode-extension, resolve-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/
          merge-multiple: true

      - name: Download VS Code extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: dist/

      - name: Add installer scripts to dist
        run: |
          mkdir -p dist
          cp install.sh dist/
          cp install.ps1 dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.tar.gz *.zip *.vsix install.sh install.ps1 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: bino-bi/bino-cli-releases
          token: ${{ secrets.BINO_CLI_RELEASES_TOKEN }}
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: ${{ needs.resolve-tag.outputs.tag }}
          body: |
            ## Bino CLI ${{ needs.resolve-tag.outputs.tag }}

            **Commit:** `${{ github.sha }}`
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.vsix
            dist/install.sh
            dist/install.ps1
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 30

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: [release, resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Extract checksums and update formula
        id: formula
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"
          CHECKSUMS_FILE="dist/checksums.txt"

          # Extract SHA256 sums from checksums.txt
          SHA256_DARWIN_ARM64=$(grep "bino-cli_Darwin_arm64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          SHA256_DARWIN_X86_64=$(grep "bino-cli_Darwin_x86_64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          SHA256_LINUX_X86_64=$(grep "bino-cli_Linux_x86_64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')

          echo "Version: $VERSION"
          echo "Darwin ARM64: $SHA256_DARWIN_ARM64"
          echo "Darwin x86_64: $SHA256_DARWIN_X86_64"
          echo "Linux x86_64: $SHA256_LINUX_X86_64"

          # Update formula with actual values
          cp homebrew/bino-cli.rb homebrew/bino-cli-updated.rb
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_DARWIN_ARM64_PLACEHOLDER/$SHA256_DARWIN_ARM64/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_DARWIN_X86_64_PLACEHOLDER/$SHA256_DARWIN_X86_64/g" homebrew/bino-cli-updated.rb
          sed -i "s/SHA256_LINUX_X86_64_PLACEHOLDER/$SHA256_LINUX_X86_64/g" homebrew/bino-cli-updated.rb

          echo "=== Updated formula ==="
          cat homebrew/bino-cli-updated.rb

      - name: Push to Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.BINO_CLI_RELEASES_TOKEN }}
        run: |
          VERSION="${{ needs.resolve-tag.outputs.version }}"

          # Clone the tap repository
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/bino-bi/homebrew-tap.git" tap-repo

          # Create Formula directory if it doesn't exist
          mkdir -p tap-repo/Formula

          # Copy the updated formula
          cp homebrew/bino-cli-updated.rb tap-repo/Formula/bino-cli.rb

          # Commit and push
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bino-cli.rb
          git commit -m "Update bino-cli to v${VERSION}" || echo "No changes to commit"
          git push origin main

  build-docs:
    name: Build and Push Docs
    needs: [release, resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          push: true
          tags: |
            registry.sys.bino.bi/bino/cli-docs:${{ needs.resolve-tag.outputs.version }}
            registry.sys.bino.bi/bino/cli-docs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update stack
        uses: fjogeleit/http-request-action@v1
        with:
          url: "https://deploy.sys.bino.bi/deploy/swarm"
          bearerToken: ${{ secrets.DEPLOY_TOKEN }}
          timeout: 60000
          data: |
            {
              "resource": "bino-bi",
              "actions": [
                { "env": {
                    "CLI_VERSION": "${{ needs.resolve-tag.outputs.version }}"
                  }
                }
              ]
            }
