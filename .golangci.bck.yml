# golangci-lint configuration for bino-cli
# See https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional useful linters
    - bodyclose       # Check HTTP response body is closed
    - durationcheck   # Check for duration multiplication mistakes
    - errname         # Check error naming conventions
    - errorlint       # Find issues with error wrapping
    - exhaustive      # Check exhaustiveness of enum switch statements
    - gci             # Control import order
    - gocritic        # Opinionated code style checks
    - gofmt           # Check code is formatted
    - goimports       # Check import ordering
    - gosec           # Security-focused linting
    - misspell        # Find misspelled words
    - nilerr          # Find code that returns nil even if err is not nil
    - noctx           # Find HTTP requests without context.Context
    - prealloc        # Find slice declarations that could be preallocated
    - revive          # Fast, configurable, extensible linter for Go
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Find unused function parameters
    - whitespace      # Check for unnecessary whitespace

  disable:
    - wsl             # Overly strict whitespace rules
    - funlen          # Function length - we have long wizard functions
    - gocognit        # Cognitive complexity - wizard functions are complex
    - gocyclo         # Cyclomatic complexity - wizard functions are complex
    - lll             # Line length - handled by editor
    - nlreturn        # Too strict about blank lines before return
    - wrapcheck       # Too strict about error wrapping

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - io.WriteString

  exhaustive:
    default-signifies-exhaustive: true

  gci:
    sections:
      - standard
      - default
      - prefix(bino.bi/bino)
    skip-generated: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam        # Allow passing large structs by value
      - rangeValCopy     # Allow range value copies
      - paramTypeCombine # Don't require combining same-type params

  goimports:
    local-prefixes: bino.bi/bino

  gosec:
    excludes:
      - G104  # Audit errors not checked (we use errcheck)
      - G304  # File path from variable (we need dynamic paths)

  misspell:
    locale: US

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
        disabled: true  # We don't require package comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true  # Handled by unparam
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Ignore long lines in generated files
    - path: _test\.go
      linters:
        - gocritic
        - gosec

    # Ignore error checks in test helpers
    - path: _test\.go
      linters:
        - errcheck
      text: "Error return value of .* is not checked"

    # Allow underscores in test function names
    - path: _test\.go
      linters:
        - revive
      text: "should not use underscores in Go names"

    # Ignore security issues in tests
    - path: _test\.go
      linters:
        - gosec

    # Allow package comments to be missing
    - linters:
        - revive
      text: "should have a package comment"
