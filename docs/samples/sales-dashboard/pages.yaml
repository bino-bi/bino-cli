apiVersion: bino.bi/v1alpha1
kind: LayoutPage
metadata:
  name: text-page
spec:
  titleRow:
    businessUnit: "Acme Corp"
    measures:
      - name: "Executive Summary"
        unit: ""
    dateEnd: "2025-06-30"
    dateFormat: month
    dateLink: interval
  footer:
    text: "Acme Corp - Management Report"
    code: "S.05"
  children:
    - kind: Text
      metadata:
        name: exec_summary
      spec:
        value: |
          **H1 2025 Executive Summary**

          The first half of 2025 showed strong performance across all business segments. Key highlights:

          - **Total Revenue:** EUR 13.7m (+10.1% vs PY, +3.6% vs Budget)
          - **Product Sales:** EUR 8.4m, driven by new enterprise contracts
          - **Services Revenue:** EUR 3.3m, growing +12.1% year-over-year
          - **Licensing:** EUR 2.0m, stable recurring base

          **Regional Performance:**
          The DACH region continues to lead with EUR 4.3m, followed by UK & Ireland at EUR 3.1m. Eastern Europe showed the highest growth rate at +20.8%.

          **Outlook:**
          Full-year forecast stands at EUR 28.5m, supported by a strong pipeline in Q3. The team expects continued momentum from the recently launched product line expansion.
        dataset: revenue_by_region
---
