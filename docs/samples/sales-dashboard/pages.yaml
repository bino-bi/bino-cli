apiVersion: bino.bi/v1alpha1
kind: LayoutPage
metadata:
  name: sales-dashboard-page
spec:
  pageLayout: 2x2
  titleRow:
    businessUnit: "Acme Corp"
    measures:
      - name: "Revenue"
        unit: "EUR k"
    titleScenarios: "AC, PY, BU"
    dateEnd: "2025-06-30"
    dateFormat: month
    dateLink: interval
  footer:
    text: "Acme Corp - Monthly Sales Report"
    code: "S.01"
  children:
    - kind: ChartStructure
      metadata:
        name: revenue_chart
      spec:
        dataset: revenue_by_region
        scenarios:
          - ac1
          - pp1
        variances:
          - dac1_pp1_pos
          - drac1_pp1_pos
        level: category
        order: ac1
        orderDirection: desc
        unitScaling: 0.001
        percentageScaling: 25
        chartTitle: "Revenue by Region"
    - kind: ChartTime
      metadata:
        name: revenue_trend_chart
      spec:
        dataset: revenue_trend
        scenarios:
          - ac1
          - pp1
          - fc1
        level: category
        order: category
        orderDirection: asc
        unitScaling: 0.001
        chartTitle: "Monthly Revenue Trend"
    - kind: Table
      metadata:
        name: financial_table
      spec:
        dataset: financial_summary
        scenarios:
          - ac1
          - pp1
          - pl1
        variances:
          - dac1_pl1_pos
          - drac1_pl1_pos
        grouped: true
    - kind: Text
      metadata:
        name: kpi_summary
      spec:
        value: |
          **H1 2025 Summary**

          Total revenue reached **EUR 13.7m** year-to-date, exceeding plan by **+3.6%** and prior year by **+10.1%**. DACH remains the strongest region contributing 31% of total revenue. Growth in Eastern Europe accelerated with +20.8% vs PY.
---
