version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  disable:
    - funlen
    - gocognit
    - gocyclo
    - lll
    - nlreturn
    - wrapcheck
    - wsl
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.WriteString
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      excludes:
        - G104
        - G304
    misspell:
      locale: US
      ignore-words:
        - artefact
        - cancelled
        - recognised
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
          - gosec
        path: _test\.go
      - linters:
          - errcheck
        path: _test\.go
        text: Error return value of .* is not checked
      - linters:
          - revive
        path: _test\.go
        text: should not use underscores in Go names
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - revive
        text: should have a package comment
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(bino.bi/bino)
    goimports:
      local-prefixes:
        - bino.bi/bino
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
