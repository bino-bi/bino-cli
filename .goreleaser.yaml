# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

# NOTE: This config is for LOCAL development only.
# CI releases use the GitHub Actions workflow with native runners for CGO builds.
# For local builds: goreleaser build --snapshot --clean --single-target

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  # macOS: uses default duckdb-go-bindings (extensions installed at runtime)
  - id: darwin
    main: ./cmd/bino
    binary: bino
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X 'bino.bi/bino/internal/version.Version={{ .Version }}' -X 'bino.bi/bino/internal/version.Commit={{ .Commit }}' -X 'bino.bi/bino/internal/version.Date={{ .Date }}'"

  # Linux: links against libduckdb_bundle.a with embedded extensions.
  # Requires DUCKDB_LIB_LINUX env var pointing to the directory containing libduckdb_bundle.a.
  - id: linux-amd64
    main: ./cmd/bino
    binary: bino
    tags:
      - duckdb_use_static_lib
    env:
      - CGO_ENABLED=1
      - CGO_CPPFLAGS=-DDUCKDB_STATIC_BUILD
      - CGO_LDFLAGS=-L{{ .Env.DUCKDB_LIB_LINUX }} -lduckdb_bundle -lstdc++ -lm -ldl
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - "-s -w -X 'bino.bi/bino/internal/version.Version={{ .Version }}' -X 'bino.bi/bino/internal/version.Commit={{ .Commit }}' -X 'bino.bi/bino/internal/version.Date={{ .Date }}'"

  # Windows: cross-compiled with MinGW, links against libduckdb_bundle.a with embedded extensions.
  # Requires DUCKDB_LIB_WINDOWS env var pointing to the directory containing libduckdb_bundle.a.
  - id: windows-amd64
    main: ./cmd/bino
    binary: bino
    tags:
      - duckdb_use_static_lib
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
      - CGO_CPPFLAGS=-DDUCKDB_STATIC_BUILD
      - CGO_LDFLAGS=-L{{ .Env.DUCKDB_LIB_WINDOWS }} -lduckdb_bundle -lws2_32 -lwsock32 -lrstrtmgr -lstdc++ -lm --static
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - "-s -w -X 'bino.bi/bino/internal/version.Version={{ .Version }}' -X 'bino.bi/bino/internal/version.Commit={{ .Commit }}' -X 'bino.bi/bino/internal/version.Date={{ .Date }}'"

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
